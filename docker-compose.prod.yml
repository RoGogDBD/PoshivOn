services:
  app:
    image: ghcr.io/${IMAGE_OWNER}/poshivon-app:${IMAGE_TAG}
    container_name: poshivon_app
    environment:
      APP_STORAGE: ${APP_STORAGE}
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_ENDPOINT: ${DEEPSEEK_API_ENDPOINT}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      DEEPSEEK_TIMEOUT_SEC: ${DEEPSEEK_TIMEOUT_SEC}
      DEEPSEEK_MAX_RETRIES: ${DEEPSEEK_MAX_RETRIES}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: ${YANDEX_REDIRECT_URI}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/${IMAGE_OWNER}/poshivon-web:${IMAGE_TAG}
    container_name: poshivon_web

  proxy:
    image: nginx:1.27-alpine
    container_name: poshivon_proxy
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: poshivon.ru,www.poshivon.ru
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: poshivon.ru,www.poshivon.ru
      LETSENCRYPT_EMAIL: chudra2015@gmail.com
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - proxy
    depends_on:
      - web
      - app
      - grafana

  db:
    image: mariadb:11.4
    container_name: poshivon_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: poshivon_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    container_name: poshivon_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://poshivon.ru/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: poshivon_node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  mariadb_data:
  prometheus_data:
  grafana_data:

networks:
  proxy:
    external: true
    name: haclever_proxy
