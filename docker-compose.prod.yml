services:
  app:
    image: ghcr.io/${IMAGE_OWNER}/poshivon-app:${IMAGE_TAG}
    container_name: poshivon_app
    environment:
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/${IMAGE_OWNER}/poshivon-web:${IMAGE_TAG}
    container_name: poshivon_web

  proxy:
    image: nginx:1.27-alpine
    container_name: poshivon_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/poshivon/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/poshivon/certs:/etc/nginx/certs:ro
    depends_on:
      - web

  db:
    image: mariadb:11.4
    container_name: poshivon_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
