services:
  app:
    # Сервис приложения.
    build:
      context: ./server
    container_name: poshivon_app
    environment:
      # Конфигурация приложения.
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_ENDPOINT: ${DEEPSEEK_API_ENDPOINT:-https://api.deepseek.com/v1/chat/completions}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_TIMEOUT_SEC: ${DEEPSEEK_TIMEOUT_SEC:-45}
      DEEPSEEK_MAX_RETRIES: ${DEEPSEEK_MAX_RETRIES:-3}
      # Данные подключения к БД (на потом).
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: poshivon
      DB_USER: poshivon
      DB_PASSWORD: poshivon
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    # Frontend на React + Vite.
    build:
      context: ./client
    container_name: poshivon_web
    ports:
      - "5173:80"

  db:
    # Контейнер с MariaDB.
    image: mariadb:11.4
    container_name: poshivon_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: poshivon
      MARIADB_USER: poshivon
      MARIADB_PASSWORD: poshivon
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: poshivon_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.6.1
    container_name: poshivon_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter:v1.9.1
    container_name: poshivon_node_exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  mariadb_data:
  prometheus_data:
  grafana_data:
